apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: proxy-injector
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
webhooks:
  - name: proxy-injector.example.com
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    namespaceSelector:
      matchLabels:
        inject-proxy: "true"
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
    clientConfig:
      service:
        name: proxy-injector
        namespace: proxy-injector
        path: /inject
      caBundle: ""