apiVersion: v1
kind: ServiceAccount
metadata:
  name: proxy-injector
  namespace: proxy-injector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: proxy-injector
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: proxy-injector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: proxy-injector
subjects:
  - kind: ServiceAccount
    name: proxy-injector
    namespace: proxy-injector